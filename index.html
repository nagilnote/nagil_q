<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>KRQ-53 한국 회복탄력성 지수</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --ink:    #111827;
  --ink2:   #1f2937;
  --muted:  #4b5563;
  --line:   #d1d5db;
  --bg:     #f3f4f6;
  --white:  #ffffff;
  --blue:   #1d4ed8;
  --blue-l: #eff6ff;
  --teal:   #0e7490;
  --teal-l: #ecfeff;
  --amber:  #b45309;
  --amber-l:#fffbeb;
  --red:    #b91c1c;
  --red-l:  #fef2f2;
  --green:  #047857;
  --green-l:#ecfdf5;
  --purple: #6d28d9;
  --r: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;overflow-x:hidden;
  font-size:18px;line-height:1.7;
}

/* ── HEADER ── */
.hd{background:#1e3a5f;color:#fff;padding:34px 20px 50px;text-align:center;position:relative;overflow:hidden;}
.hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(37,99,235,.3),transparent 60%);}
.hd-badge{display:inline-block;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:14px;position:relative;}
.hd h1{font-family:'Noto Serif KR',serif;font-size:clamp(22px,6vw,30px);font-weight:700;line-height:1.3;position:relative;}
.hd h1 em{color:#93c5fd;font-style:normal;}
.hd p{font-size:15px;color:rgba(255,255,255,.85);margin-top:8px;position:relative;}
.hd-wave{position:absolute;bottom:-1px;left:0;width:100%;height:28px;fill:var(--bg);}

/* ── PROGRESS ── */
.prog-wrap{max-width:620px;margin:0 auto;padding:20px 20px 0;display:none;}
.prog-top{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.prog-bg{height:10px;background:var(--line);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:10px;transition:width .5s;width:0%;}

/* ── WRAP ── */
.wrap{max-width:620px;margin:0 auto;padding:20px 16px 70px;}
.scr{display:none;}
.scr.on{display:block;animation:up .35s ease;}
@keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--r);padding:24px 20px;box-shadow:0 2px 16px rgba(15,25,35,.08);margin-bottom:16px;}
.card-title{font-size:19px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--ink);}

/* ── INTRO ── */
.intro-hero{background:linear-gradient(135deg,#1e3a5f,#0f1923);border-radius:var(--r);padding:30px 24px;color:#fff;margin-bottom:16px;}
.intro-hero .kbadge{display:inline-block;background:rgba(147,197,253,.2);border:1px solid rgba(147,197,253,.5);color:#bfdbfe;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.intro-hero h2{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;line-height:1.45;margin-bottom:10px;}
.intro-hero p{font-size:16px;color:rgba(255,255,255,.85);line-height:1.75;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--white);border-radius:14px;padding:16px 10px;text-align:center;box-shadow:0 2px 10px rgba(15,25,35,.07);}
.stat .sv{font-size:24px;font-weight:900;color:var(--blue);}
.stat .sl{font-size:13px;color:var(--muted);margin-top:3px;font-weight:600;}

/* ── SCALE BOX ── */
.scale-box{background:var(--blue-l);border:2px solid #bfdbfe;border-radius:14px;padding:16px 18px;margin-bottom:16px;}
.scale-box h4{font-size:17px;font-weight:700;color:var(--blue);margin-bottom:12px;}
.scale-chips{display:flex;gap:7px;flex-wrap:wrap;}
.sc{display:flex;align-items:center;gap:7px;background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;font-size:15px;color:var(--ink);font-weight:500;}
.sc b{width:28px;height:28px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}

/* ── NAME INPUT ── */
.name-wrap{margin-bottom:16px;}
.name-wrap label{display:block;font-size:17px;font-weight:700;margin-bottom:8px;color:var(--ink);}
.name-inp{width:100%;border:2.5px solid var(--line);border-radius:12px;padding:15px 18px;font-size:18px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s;background:var(--bg);color:var(--ink);}
.name-inp:focus{border-color:var(--blue);background:#fff;}

/* ── SECTION LABEL ── */
.sec-label{display:flex;align-items:center;gap:12px;padding:16px 18px;background:var(--white);border-radius:14px;margin-bottom:16px;box-shadow:0 2px 10px rgba(15,25,35,.07);border-left:5px solid var(--blue);}
.sec-label .sicon{font-size:28px;}
.sec-label .sinfo .sname{font-size:18px;font-weight:700;color:var(--ink);}
.sec-label .sinfo .sdesc{font-size:14px;color:var(--muted);margin-top:2px;font-weight:500;}
.sec-label .sprog{margin-left:auto;font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap;}

/* ── QUESTION ── */
.q{background:var(--white);border-radius:var(--r);padding:22px 18px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(15,25,35,.06);border-left:4px solid transparent;transition:border-color .2s;}
.q.done{border-left-color:var(--teal);}
.q-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.qn{min-width:34px;height:34px;background:var(--bg);border:2px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--muted);flex-shrink:0;margin-top:2px;}
.q.done .qn{background:var(--teal-l);border-color:#67e8f9;color:var(--teal);}
.qtxt{font-size:18px;line-height:1.75;font-weight:500;color:var(--ink);}

/* ── LIKERT ── */
.likert{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.lb{border:2px solid var(--line);border-radius:12px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 8px;gap:5px;cursor:pointer;transition:all .15s;min-height:72px;width:100%;}
.lb .lv{font-size:22px;font-weight:900;color:var(--ink);}
.lb .ll{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;font-weight:600;word-break:keep-all;}
.lb:active{transform:scale(.94);}
.lb.sel{background:var(--blue);border-color:var(--blue);box-shadow:0 4px 16px rgba(29,78,216,.35);}
.lb.sel .lv,.lb.sel .ll{color:#fff;}

/* ── NAV ── */
.nav{display:grid;grid-template-columns:auto 1fr;gap:12px;margin-top:8px;}
.btn-prev{background:var(--white);border:2.5px solid var(--line);color:var(--ink);border-radius:14px;padding:17px 20px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-prev:hover{border-color:var(--blue);color:var(--blue);}
.btn-next{background:var(--blue);border:none;border-radius:14px;padding:17px;font-size:17px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(29,78,216,.3);}
.btn-next:hover{background:#1e40af;}

/* ── RESULT HERO ── */
.res-hero{background:#1e3a5f;color:#fff;border-radius:var(--r);padding:28px 22px;margin-bottom:16px;position:relative;overflow:hidden;}
.res-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(37,99,235,.35),transparent 55%);}
.res-name{font-size:16px;color:rgba(255,255,255,.8);margin-bottom:4px;position:relative;font-weight:600;}
.res-date{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px;position:relative;}
.res-total-wrap{display:flex;align-items:center;gap:20px;position:relative;}
.score-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
.score-ring-svg{width:120px;height:120px;transform:rotate(-90deg);}
.score-ring-svg circle{fill:none;stroke-width:10;stroke-linecap:round;}
.sr-bg{stroke:rgba(255,255,255,.12);}
.sr-fg{stroke:url(#sg);stroke-dasharray:314;stroke-dashoffset:314;transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1);}
.score-inner{position:absolute;top:0;left:0;width:120px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-big{font-size:30px;font-weight:900;line-height:1;}
.score-of{font-size:12px;color:rgba(255,255,255,.55);}
.res-right{flex:1;}
.res-level{font-size:19px;font-weight:800;line-height:1.35;margin-bottom:8px;}
.res-desc{font-size:15px;color:rgba(255,255,255,.85);line-height:1.7;}
.res-interp{font-size:14px;color:rgba(255,255,255,.7);line-height:1.65;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.15);position:relative;}

/* ── AREA SECTION ── */
.area-section{margin-bottom:16px;}
.area-header{display:flex;align-items:center;gap:10px;background:var(--white);border-radius:14px 14px 0 0;padding:16px 18px;border-bottom:2px solid var(--bg);}
.area-header .aico{font-size:22px;}
.area-header .aname{font-size:17px;font-weight:700;color:var(--ink);}
.area-header .ascore-wrap{margin-left:auto;text-align:right;}
.area-header .ascore{font-size:22px;font-weight:900;color:var(--blue);}
.area-header .amax{font-size:13px;color:var(--muted);font-weight:600;}
.area-header .alevel{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:2px;display:inline-block;}
.area-interp{background:#f8fafc;border-left:4px solid var(--blue);padding:13px 16px;font-size:15px;line-height:1.7;color:var(--ink2);border-radius:0 0 0 0;}
.area-bar-row{background:var(--white);padding:10px 18px 6px;}
.area-bar-bg{height:8px;background:var(--line);border-radius:10px;overflow:hidden;}
.area-bar-fill{height:100%;border-radius:10px;width:0%;transition:width 1s .3s;}

/* ── SUB FACTOR ── */
.sub-grid{background:var(--white);border-radius:0 0 14px 14px;padding:0 16px 14px;display:flex;flex-direction:column;gap:10px;}
.sub-item{background:var(--bg);border-radius:12px;padding:14px 16px;}
.sub-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sub-name{font-size:16px;font-weight:700;color:var(--ink);}
.sub-score-wrap{text-align:right;}
.sub-score{font-size:18px;font-weight:900;color:var(--blue);}
.sub-max{font-size:12px;color:var(--muted);}
.sub-level{font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:8px;}
.sub-bar-bg{height:6px;background:var(--line);border-radius:10px;overflow:hidden;margin-bottom:6px;}
.sub-bar-fill{height:100%;border-radius:10px;width:0%;transition:width 1s .5s;}
.sub-avg{font-size:13px;color:var(--muted);font-weight:500;}

/* level chips */
.lv-great{background:#dcfce7;color:#14532d;}
.lv-good{background:#dbeafe;color:#1e3a8a;}
.lv-mid{background:var(--amber-l);color:#78350f;}
.lv-low{background:var(--red-l);color:#7f1d1d;}

/* area bar colors */
.ab-c1{background:linear-gradient(90deg,#3b82f6,#6366f1);}
.ab-c2{background:linear-gradient(90deg,var(--teal),var(--green));}
.ab-c3{background:linear-gradient(90deg,var(--amber),#f59e0b);}
.sb-c1{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
.sb-c2{background:linear-gradient(90deg,#6366f1,#818cf8);}
.sb-c3{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.sb-c4{background:linear-gradient(90deg,#0e7490,#22d3ee);}
.sb-c5{background:linear-gradient(90deg,#047857,#34d399);}
.sb-c6{background:linear-gradient(90deg,#0369a1,#38bdf8);}
.sb-c7{background:linear-gradient(90deg,#b45309,#fbbf24);}
.sb-c8{background:linear-gradient(90deg,#be185d,#f472b6);}
.sb-c9{background:linear-gradient(90deg,#7c3aed,#c084fc);}

/* ── TOTAL INTERP ── */
.total-interp{background:var(--white);border-radius:var(--r);padding:22px 20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(15,25,35,.08);}
.total-interp h3{font-size:18px;font-weight:700;margin-bottom:12px;color:var(--ink);}
.interp-text{font-size:16px;line-height:1.8;color:var(--ink2);}

/* ── ADVICE ── */
.advice-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.advice-list li{background:var(--bg);border-radius:12px;padding:15px 16px;font-size:16px;line-height:1.75;color:var(--ink);border-left:4px solid var(--blue);font-weight:500;}

/* ── BUTTONS ── */
.btn-full{width:100%;padding:18px;border:none;border-radius:14px;font-size:17px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.btn-dark{background:var(--blue);color:#fff;box-shadow:0 4px 18px rgba(29,78,216,.25);}
.btn-dark:hover{background:#1e40af;}
.btn-line{background:var(--white);color:var(--blue);border:2.5px solid var(--blue);}
.btn-line:hover{background:var(--blue-l);}
.btn-green{background:#047857;color:#fff;box-shadow:0 4px 18px rgba(4,120,87,.25);}
.btn-green:hover{background:#065f46;}


/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e3a5f;color:#fff;padding:14px 24px;border-radius:30px;font-size:16px;font-weight:600;transition:transform .3s;z-index:999;max-width:90vw;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── SAVE TARGET ── */
#saveTarget{background:var(--bg);}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
</svg>

<!-- 헤더 -->
<div class="hd">
  <div class="hd-badge">Korea Resilience Quotient</div>
  <h1>한국 <em>회복탄력성</em> 지수</h1>
  <p>KRQ-53 · 자기보고식 표준화 검사</p>
  <svg class="hd-wave" viewBox="0 0 1200 28" preserveAspectRatio="none">
    <path d="M0,14 C200,0 400,28 600,14 C800,0 1000,28 1200,14 L1200,28 L0,28 Z"/>
  </svg>
</div>

<!-- 진행률 -->
<div class="prog-wrap" id="progWrap">
  <div class="prog-top">
    <span id="progTxt">0 / 53 완료</span>
    <span id="progPct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="wrap">

<!-- ① 인트로 -->
<div id="s-intro" class="scr on">
  <div class="intro-hero">
    <div class="kbadge">KRQ-53 공식 도구</div>
    <h2>나의 회복탄력성은<br>얼마나 될까요?</h2>
    <p>김주환(2011) 교수 연구 기반의 한국형 회복탄력성 검사입니다.<br>자기조절능력, 대인관계능력, 긍정성을 측정합니다.</p>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="sv">53</div><div class="sl">총 문항</div></div>
    <div class="stat"><div class="sv">9</div><div class="sl">하위 요소</div></div>
    <div class="stat"><div class="sv">약 8분</div><div class="sl">소요 시간</div></div>
  </div>
  <div class="scale-box">
    <h4>응답 척도 안내</h4>
    <div class="scale-chips">
      <div class="sc"><b>1</b> 전혀 그렇지 않다</div>
      <div class="sc"><b>2</b> 그렇지 않다</div>
      <div class="sc"><b>3</b> 보통이다</div>
      <div class="sc"><b>4</b> 어느 정도 그렇다</div>
      <div class="sc"><b>5</b> 매우 그렇다</div>
    </div>
  </div>
  <div class="name-wrap">
    <label>이름 또는 번호 (선택 사항)</label>
    <input type="text" class="name-inp" id="nameInp" placeholder="입력하지 않으면 익명으로 처리됩니다" maxlength="20">
  </div>
  <button class="btn-full btn-dark" onclick="startSurvey()">검사 시작하기 →</button>
</div>

<!-- ② 설문 -->
<div id="s-survey" class="scr">
  <div class="sec-label" id="secLabel">
    <div class="sicon" id="secIcon">📋</div>
    <div class="sinfo">
      <div class="sname" id="secName">문항</div>
      <div class="sdesc" id="secDesc"></div>
    </div>
    <div class="sprog" id="secProg"></div>
  </div>
  <div id="qContainer"></div>
  <div class="nav">
    <button class="btn-prev" id="btnPrev" onclick="prevPage()">← 이전</button>
    <button class="btn-next" id="btnNext" onclick="nextPage()">다음 →</button>
  </div>
</div>

<!-- ③ 결과 -->
<div id="s-result" class="scr">
  <div id="saveTarget">

  <!-- 결과 히어로 -->
  <div class="res-hero" id="resHero">
    <div class="res-name" id="resName"></div>
    <div class="res-date" id="resDate"></div>
    <div class="res-total-wrap">
      <div class="score-ring-wrap">
        <svg class="score-ring-svg" viewBox="0 0 120 120">
          <circle class="sr-bg" cx="60" cy="60" r="50"/>
          <circle class="sr-fg" id="srFg" cx="60" cy="60" r="50"/>
        </svg>
        <div class="score-inner">
          <div class="score-big" id="scoreBig">0</div>
          <div class="score-of">/ 265</div>
        </div>
      </div>
      <div class="res-right">
        <div class="res-level" id="resLevel"></div>
        <div class="res-desc" id="resDesc"></div>
        <div class="res-interp" id="resInterp"></div>
      </div>
    </div>
  </div>

  <!-- 자기조절능력 -->
  <div class="area-section" id="areaSec0"></div>
  <!-- 대인관계능력 -->
  <div class="area-section" id="areaSec1"></div>
  <!-- 긍정성 -->
  <div class="area-section" id="areaSec2"></div>

  <!-- 성장 제안 -->
  <div class="card">
    <div class="card-title">💡 맞춤 성장 제안</div>
    <ul class="advice-list" id="adviceList"></ul>
  </div>

  </div><!-- /saveTarget -->

  <button class="btn-full btn-green" onclick="saveImage()">📷 결과 이미지로 저장하기</button>
  <button class="btn-full btn-dark" onclick="retake()">🔄 다시 검사하기</button>
  </div>

</div><!-- /wrap -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
//  역채점 문항 (6 - 점수)
// ════════════════════════════════════════════════════════
var REVERSE = {4:1,5:1,6:1,10:1,11:1,12:1,16:1,17:1,18:1,
               22:1,23:1,24:1,28:1,29:1,30:1,34:1,35:1,36:1,
               40:1,41:1,42:1,51:1,52:1,53:1};

// ════════════════════════════════════════════════════════
//  하위 요소 정의 (9개)
// ════════════════════════════════════════════════════════
var SUBS = [
  // 자기조절능력

function goScr(id){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}
function getScore(n){
  // n은 문항 번호(1~53)
  var raw=answers[n];
  if(raw===undefined) return 0;
  return REVERSE[n] ? (6-raw) : raw;
}
function getLevelChip(code, label){
  return '<span class="sub-level lv-'+code+'">'+label+'</span>';
}
function subLevel(pct){
  if(pct>=80) return ['great','높음'];
  if(pct>=60) return ['good','보통'];
  if(pct>=40) return ['mid','주의'];
  return ['low','낮음'];
}

  document.getElementById('secName').textContent=p.title;
  document.getElementById('secDesc').textContent=p.desc;
  document.getElementById('secProg').textContent=(page+1)+' / '+PAGES.length;

  var con=document.getElementById('qContainer');
  con.innerHTML='';

  p.qs.forEach(function(n){
    var q=QS[n-1];
    var ans=answers[n];

    var card=document.createElement('div');
    card.className='q'+(ans!==undefined?' done':'');
    card.id='qc'+n;

    var head=document.createElement('div');
    head.className='q-head';

    var qnum=document.createElement('div');
    qnum.className='qn'; qnum.id='qn'+n;
    qnum.textContent=n;

    var qtxt=document.createElement('div');
    qtxt.className='qtxt';
    qtxt.textContent=q.t;

    head.appendChild(qnum); head.appendChild(qtxt);
    card.appendChild(head);

    var likert=document.createElement('div');
    likert.className='likert'; likert.id='lk'+n;

    for(var v=1;v<=5;v++){
      var btn=document.createElement('button');
      btn.className='lb'+(ans===v?' sel':'');
      btn.type='button';

      var lv=document.createElement('span'); lv.className='lv'; lv.textContent=v;
      var ll=document.createElement('span'); ll.className='ll'; ll.innerHTML=LLABELS[v-1];
      btn.appendChild(lv); btn.appendChild(ll);

      (function(qn,val,b){
        b.addEventListener('click',function(){pickAnswer(qn,val,b);});
      })(n,v,btn);

      likert.appendChild(btn);
    }
    card.appendChild(likert);
    con.appendChild(card);
  });

  updateNav(); updateProgress();
}

function pickAnswer(n,v,btn){
  answers[n]=v;
  document.getElementById('lk'+n).querySelectorAll('.lb').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  document.getElementById('qc'+n).classList.add('done');
  var qnum=document.getElementById('qn'+n);
  qnum.style.background=''; qnum.style.borderColor=''; qnum.style.color='';
  updateNav(); updateProgress();
}

function isPageComplete(){
  return PAGES[page].qs.every(function(n){return answers[n]!==undefined;});
}

function updateNav(){
  document.getElementById('btnPrev').style.visibility=(page===0)?'hidden':'visible';
  var nb=document.getElementById('btnNext');
  var done=isPageComplete();
  nb.textContent=(page===PAGES.length-1)?(done?'결과 보기 🎉':'결과 보기'):'다음 →';
  nb.style.opacity=done?'1':'0.55';
}

function updateProgress(){
  var done=Object.keys(answers).length;
  var pct=Math.round(done/53*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=done+' / 53 완료';
  document.getElementById('progPct').textContent=pct+'%';
}

function prevPage(){if(page>0){page--; renderPage();}}
function nextPage(){
  if(!isPageComplete()){
    var missing=PAGES[page].qs.filter(function(n){return answers[n]===undefined;});
    missing.forEach(function(n,i){
      var el=document.getElementById('qn'+n);
      if(el){el.style.background='#fef2f2';el.style.borderColor='#fca5a5';el.style.color='#b91c1c';}
      if(i===0){
        var c=document.getElementById('qc'+n);
        if(c) c.scrollIntoView({behavior:'smooth',block:'center'});
      }
    });
    showToast('아직 '+missing.length+'개 문항에 응답하지 않으셨어요!');
    return;
  }
  if(page<PAGES.length-1){page++; renderPage();}
  else showResult();
}

// ════════════════════════════════════════════════════════
//  결과 계산
// ════════════════════════════════════════════════════════
function showResult(){
  document.getElementById('progWrap').style.display='none';
  goScr('s-result');

  // 하위 요소 점수
  var subScores=SUBS.map(function(s){
    var score=s.items.reduce(function(acc,n){return acc+getScore(n);},0);
    return score;
  });

  // 영역 점수
  var areaScores=[
    subScores[0]+subScores[1]+subScores[2], // 자기조절
    subScores[3]+subScores[4]+subScores[5], // 대인관계
    subScores[6]+subScores[7]+subScores[8], // 긍정성
  ];
  var total=areaScores[0]+areaScores[1]+areaScores[2];

  // ── 결과 히어로 ──
  var tl=totalLevel(total);
  document.getElementById('resName').textContent=userName+'님의 회복탄력성 검사 결과';
  var now=new Date();
  document.getElementById('resDate').textContent=
    now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';
  document.getElementById('resLevel').textContent=tl.level;
  document.getElementById('resDesc').textContent=tl.desc;
  document.getElementById('resInterp').textContent=tl.interp;

  // 링 애니메이션
  var arc=document.getElementById('srFg');
  var C=2*Math.PI*50;
  var pct=total/265;
  var t0=null;
  function animTick(ts){
    if(!t0) t0=ts;
    var t=Math.min((ts-t0)/1400,1);
    var e=1-Math.pow(1-t,3);
    document.getElementById('scoreBig').textContent=Math.round(e*total);
    arc.style.strokeDashoffset=C*(1-e*pct);
    if(t<1) requestAnimationFrame(animTick);
  }
  requestAnimationFrame(animTick);

  // ── 3개 영역 섹션 렌더 ──
  var areaBarColors=['ab-c1','ab-c2','ab-c3'];
  [0,1,2].forEach(function(ai){
    var A=AREAS[ai];
    var aScore=areaScores[ai];
    var aPct=(aScore/A.max*100).toFixed(0);
    var aLv=A.level(aScore);
    var interp=A.interp(aScore);

    var sec=document.getElementById('areaSec'+ai);
    sec.innerHTML='';

    // 헤더
    var header=document.createElement('div');
    header.className='area-header';
    header.innerHTML=
      '<div class="aico">'+A.icon+'</div>'+
      '<div class="aname">'+A.name+'</div>'+
      '<div class="ascore-wrap">'+
        '<div><span class="ascore">'+aScore+'</span><span class="amax"> / '+A.max+'</span>'+
        getLevelChip(aLv[0],aLv[1])+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:2px;">평균 '+A.avg+'점</div>'+
      '</div>';
    sec.appendChild(header);

    // 막대
    var barRow=document.createElement('div');
    barRow.className='area-bar-row';
    barRow.innerHTML='<div class="area-bar-bg"><div class="area-bar-fill '+A.color+'" id="abar'+ai+'"></div></div>';
    sec.appendChild(barRow);
    setTimeout(function(){
      var el=document.getElementById('abar'+ai);
      if(el) el.style.width=aPct+'%';
    },300+ai*100);

    // 해석
    var interpDiv=document.createElement('div');
    interpDiv.className='area-interp';
    interpDiv.textContent=interp;
    sec.appendChild(interpDiv);

    // 하위 요소들
    var subGrid=document.createElement('div');
    subGrid.className='sub-grid';

    A.subs.forEach(function(si,idx){
      var S=SUBS[si];
      var sScore=subScores[si];
      var sMax=S.items.length*5;
      var sPct=(sScore/sMax*100).toFixed(0);
      var sLv=subLevel(sScore/sMax*100);

      var item=document.createElement('div');
      item.className='sub-item';
      item.innerHTML=
        '<div class="sub-top">'+
          '<div class="sub-name">'+S.name+'</div>'+
          '<div style="display:flex;align-items:center;">'+
            getLevelChip(sLv[0],sLv[1])+
            '<span class="sub-score" style="margin-left:8px;">'+sScore+'</span>'+
            '<span class="sub-max"> /'+sMax+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="sub-bar-bg"><div class="sub-bar-fill '+S.color+'" id="sbar'+si+'"></div></div>'+
        '<div class="sub-avg">평균 '+S.avg+'점</div>';
      subGrid.appendChild(item);

      setTimeout(function(){
        var el=document.getElementById('sbar'+si);
        if(el) el.style.width=sPct+'%';
      },500+si*80);
    });

    sec.appendChild(subGrid);
  });

  // ── 맞춤 조언 ──
  var list=document.getElementById('adviceList');
  list.innerHTML='';
  var advices=[];

  if(areaScores[0]<63) advices.push('🧘 자기조절능력: 감정 일기 쓰기, 복식호흡, 마음챙김 명상을 꾸준히 실천해보세요.');
  if(areaScores[1]<67) advices.push('🤝 대인관계능력: 가족이나 가까운 친구와 하루 10분씩 깊은 대화를 나눠보세요.');
  if(areaScores[2]<63) advices.push('☀️ 긍정성: 매일 감사한 일 3가지를 적는 감사 일기가 큰 도움이 됩니다.');
  if(total>=200) advices.push('✨ 현재의 좋은 습관과 긍정적 태도를 꾸준히 유지하는 것이 중요합니다.');
  advices.push('🌙 충분한 수면(7~8시간), 가벼운 산책, 균형 잡힌 식사가 회복탄력성의 기반입니다.');
  advices.push('💝 어려울 때 혼자 해결하려 하지 말고 가족, 친구, 전문가의 도움을 적극 활용하세요.');

  advices.forEach(function(txt){
    var li=document.createElement('li');
    li.textContent=txt;
    list.appendChild(li);
  });
}

// ════════════════════════════════════════════════════════
//  이미지 저장
// ════════════════════════════════════════════════════════
function saveImage(){
  showToast('이미지를 저장하는 중입니다...');
  var target=document.getElementById('saveTarget');
  html2canvas(target,{
    scale:2,
    useCORS:true,
    backgroundColor:'#f3f4f6',
    logging:false
  }).then(function(canvas){
    var link=document.createElement('a');
    var now=new Date();
    var fname='회복탄력성검사_'+now.getFullYear()+(now.getMonth()+1)+now.getDate()+'.png';
    link.download=fname;
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('✅ 이미지가 저장되었습니다!');
  }).catch(function(){
    showToast('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
  });
}

// ════════════════════════════════════════════════════════
//  다시 검사
// ════════════════════════════════════════════════════════
function retake(){
  answers={}; page=0;
  document.getElementById('progWrap').style.display='block';
  goScr('s-survey'); renderPage();
}</script>
